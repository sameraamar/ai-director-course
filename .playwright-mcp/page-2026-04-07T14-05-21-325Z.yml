          - heading "Purpose" [level=1] [ref=e40]
          - paragraph [ref=e41]: This page is the public welcome page for the AI Director Course site. It exists to orient learners to the 7-day sprint, expected outcomes, and how to use the curriculum. AI agents should keep this page aligned with the actual course structure and learner promise.
          - heading "Maintenance Instructions" [level=1] [ref=e42]
          - paragraph [ref=e43]: Update this page when the course positioning, learner outcome, pacing model, or site navigation changes. Humans and AI agents may both update it, but changes should remain consistent with the internal design docs and the individual day pages. Keep this page concise, motivating, and easy for first-time learners to scan.
          - heading "Welcome to AI Director Course" [level=1] [ref=e44]
          - paragraph [ref=e45]: Build a polished 30-to-60-second cinematic AI video in seven focused days.
          - heading "What You Will Make" [level=2] [ref=e46]
          - paragraph [ref=e47]: "By the end of this sprint, you should have: - A storyboarded concept - A visually consistent set of generated frames - Motion-enhanced clips - Optional dialogue or voiceover - Music and sound design - A final edited video ready for sharing, pitching, or portfolio use"
          - heading "How the Sprint Works" [level=2] [ref=e48]
          - paragraph [ref=e49]:
            - text: "Every day uses a two-speed format: -"
            - strong [ref=e50]: "Fast Track:"
            - text: the shortest path to making progress today -
            - strong [ref=e51]: "Deep Dive:"
            - text: theory, troubleshooting, and craft notes for stronger results
          - heading "Sprint Map" [level=2] [ref=e52]
          - list [ref=e53]:
            - listitem [ref=e54]:
              - strong [ref=e55]: "Day 1:"
              - text: Break the idea into a precise 5-shot plan
            - listitem [ref=e56]:
